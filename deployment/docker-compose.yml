version: '3.8'

services:
  # 1. The live container for the web form
  app:
    image: ghcr.io/reisi007/php-base:8.5
    container_name: form-reisinger-pictures
    restart: unless-stopped
    volumes:
      - /home/webadmin/websites/form.reisinger.pictures:/var/www/html
    command: >
      sh -c '
      chown -R www-data:www-data /var/www/html;
      exec php-fpm
      '
    environment:
      # --- Required by the Make.com failure fallback (see AGENTS.md §3) ---
      - MAKE_WEBHOOK_URL=${MAKE_WEBHOOK_URL}
      - MAKE_API_KEY=${MAKE_API_KEY}
      # --- Google OAuth2 credentials (required only when auth_type=oauth2) ---
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - OAUTH_REFRESH_TOKEN=${OAUTH_REFRESH_TOKEN}
      # --- SMTP/Basic Auth credentials (required only when auth_type=password) ---
      # The active strategy is selected via mailer_options.auth_type in config.php.
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_HOST=${SMTP_HOST:-smtp.example.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_ENCRYPTION=${SMTP_ENCRYPTION:-tls}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
    networks:
      - webnet

  # 2. The ISOLATED container for testing the email token (OAuth2 version).
  #     Only relevant when auth_type=oauth2. If you switch to auth_type=password,
  #     this service can be disabled without affecting the live app.
  token-checker:
    image: ghcr.io/reisi007/php-base:8.5
    container_name: form-email-token-checker
    restart: unless-stopped
    environment:
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - OAUTH_REFRESH_TOKEN=${OAUTH_REFRESH_TOKEN}
      - MAKE_WEBHOOK_URL=${MAKE_WEBHOOK_URL}
      - MAKE_API_KEY=${MAKE_API_KEY}
      - CHECK_INTERVAL=86400 # Every 24 hours (86400 seconds)
    command: >
      sh -c '
      php -r "
        while (true) {
          echo \"[\" . date(\"Y-m-d H:i:s\") . \"] Initiating OAuth2 token check...\n\";

          \$ctx = stream_context_create([\"http\" => [
            \"method\"  => \"POST\",
            \"header\"  => \"Content-Type: application/x-www-form-urlencoded\",
            \"content\" => http_build_query([
              \"client_id\"     => getenv(\"OAUTH_CLIENT_ID\"),
              \"client_secret\" => getenv(\"OAUTH_CLIENT_SECRET\"),
              \"refresh_token\" => getenv(\"OAUTH_REFRESH_TOKEN\"),
              \"grant_type\"    => \"refresh_token\",
            ]),
          ]]);

          \$res = @file_get_contents(\"https://oauth2.googleapis.com/token\", false, \$ctx);

          if (\$res === false || str_contains(\$res, \"\\\"error\\\"\")) {
            echo \"[\" . date(\"Y-m-d H:i:s\") . \"] ERROR: Token renewal failed! Sending webhook...\n\";

            \$wctx = stream_context_create([\"http\" => [
              \"method\"  => \"POST\",
              \"header\"  => \"Content-Type: application/json\r\nx-make-apikey: \" . getenv(\"MAKE_API_KEY\"),
              \"content\" => json_encode([
                \"error\"             => \"Automated Checker: OAuth2 Refresh Token for form.reisinger.pictures has expired or is invalid!\",
                \"formatted_message\" => \"System Alert - Check Portainer Logs.\",
              ]),
            ]]);

            @file_get_contents(getenv(\"MAKE_WEBHOOK_URL\"), false, \$wctx);
          } else {
            echo \"[\" . date(\"Y-m-d H:i:s\") . \"] SUCCESS: Token is valid.\n\";
          }

          \$next = date(\"Y-m-d H:i:s\", time() + (int) getenv(\"CHECK_INTERVAL\"));
          echo \"[\" . date(\"Y-m-d H:i:s\") . \"] Next check: \$next\n\";

          sleep((int) getenv(\"CHECK_INTERVAL\"));
        }
      "
      '
    networks:
      - webnet

networks:
  webnet:
    external: true